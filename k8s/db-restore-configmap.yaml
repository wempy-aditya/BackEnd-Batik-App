apiVersion: v1
kind: ConfigMap
metadata:
  name: db-restore-script
  namespace: batik-api
data:
  restore.sh: |
    #!/bin/bash
    set -e
    
    echo "========================================="
    echo "Database Restore Script for Kubernetes"
    echo "========================================="
    
    # Wait for PostgreSQL to be ready
    echo "Waiting for PostgreSQL to be ready..."
    until pg_isready -h $POSTGRES_SERVER -U $POSTGRES_USER; do
      echo "PostgreSQL is unavailable - sleeping"
      sleep 2
    done
    echo "PostgreSQL is ready!"
    
    # Check if database already has data
    TABLE_COUNT=$(PGPASSWORD=$POSTGRES_PASSWORD psql -h $POSTGRES_SERVER -U $POSTGRES_USER -d $POSTGRES_DB -tAc "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public'")
    
    if [ "$TABLE_COUNT" -gt "0" ]; then
      echo "⚠️  Database already has $TABLE_COUNT tables"
      echo "Skipping restore to avoid data loss"
      echo "If you want to restore anyway, manually delete the database first"
      exit 0
    fi
    
    echo "Database is empty, proceeding with restore..."
    
    # Check if backup file exists
    if [ ! -f "/backup/backup.sql" ]; then
      echo "❌ Backup file not found at /backup/backup.sql"
      echo "Please create a ConfigMap/Secret with your backup file"
      exit 1
    fi
    
    # Restore database
    echo "🔄 Restoring database from backup..."
    PGPASSWORD=$POSTGRES_PASSWORD psql -h $POSTGRES_SERVER -U $POSTGRES_USER -d $POSTGRES_DB < /backup/backup.sql
    
    if [ $? -eq 0 ]; then
      echo "✅ Database restored successfully!"
      echo "Tables created: $(PGPASSWORD=$POSTGRES_PASSWORD psql -h $POSTGRES_SERVER -U $POSTGRES_USER -d $POSTGRES_DB -tAc "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public'")"
    else
      echo "❌ Database restore failed!"
      exit 1
    fi
    
    echo "========================================="
    echo "Restore completed!"
    echo "========================================="
