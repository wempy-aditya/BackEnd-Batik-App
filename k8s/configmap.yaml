apiVersion: v1
kind: ConfigMap
metadata:
  name: batik-api-config
  namespace: batik-api
data:
  # App Configuration
  ENVIRONMENT: "production"
  APP_NAME: "Batik Research API"
  APP_DESCRIPTION: "Batik Research Platform Backend API"
  APP_VERSION: "1.0.0"
  
  # Algorithm
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  
  # Database Configuration (for internal cluster service)
  POSTGRES_SERVER: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "batik_production"
  
  # Redis Configuration
  REDIS_CACHE_HOST: "redis-service"
  REDIS_CACHE_PORT: "6379"
  REDIS_QUEUE_HOST: "redis-service"
  REDIS_QUEUE_PORT: "6379"
  REDIS_RATE_LIMIT_HOST: "redis-service"
  REDIS_RATE_LIMIT_PORT: "6379"
  
  # Rate Limiting
  DEFAULT_RATE_LIMIT_LIMIT: "100"
  DEFAULT_RATE_LIMIT_PERIOD: "3600"
  
  # Admin Panel
  CRUD_ADMIN_ENABLED: "true"
  CRUD_ADMIN_MOUNT_PATH: "/admin"
  SESSION_SECURE_COOKIES: "true"
  CRUD_ADMIN_TRACK_EVENTS: "true"
  CRUD_ADMIN_TRACK_SESSIONS: "true"
