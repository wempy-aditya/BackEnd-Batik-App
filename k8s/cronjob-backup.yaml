apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: batik-api
spec:
  # Run daily at 2 AM
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: backup
            image: postgres:13
            command:
            - sh
            - -c
            - |
              TIMESTAMP=$(date +%Y%m%d_%H%M%S)
              BACKUP_FILE="/backups/backup_${TIMESTAMP}.sql"
              echo "Starting backup at ${TIMESTAMP}..."
              
              PGPASSWORD=$POSTGRES_PASSWORD pg_dump \
                -h postgres-service \
                -U $POSTGRES_USER \
                -d $POSTGRES_DB \
                > $BACKUP_FILE
              
              echo "Backup completed: $BACKUP_FILE"
              
              # Optional: Upload to S3/GCS
              # aws s3 cp $BACKUP_FILE s3://your-bucket/backups/
              # gsutil cp $BACKUP_FILE gs://your-bucket/backups/
              
              # Cleanup old backups (keep last 7 days)
              find /backups -name "backup_*.sql" -mtime +7 -delete
            env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: batik-api-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: batik-api-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: batik-api-secrets
                  key: POSTGRES_PASSWORD
            volumeMounts:
            - name: backup-storage
              mountPath: /backups
          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: backup-pvc
            # Alternative: Use object storage
            # emptyDir: {}

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backup-pvc
  namespace: batik-api
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
